<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>人体成分分析报告 - 健康数据管理</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>人体成分分析报告</h1>
      <div class="profile-info">
        <div class="profile-item"><span>性别:</span><span id="profile-gender"></span></div>
        <div class="profile-item"><span>年龄:</span><span id="profile-age"></span>岁</div>
        <div class="profile-item"><span>身高:</span><span id="profile-height"></span>cm</div>
        <div class="profile-item"><span>测量时间:</span><span id="profile-date"></span></div>
      </div>
    </div>
    
    <div class="score-card">
      <div class="score-header">
        <div class="score-circle">
          <div class="score-value" id="score-value">0</div>
          <div class="score-label">分</div>
        </div>
        <div class="score-advice" id="score-advice"></div>
      </div>
    </div>
    
    <div class="metrics-grid">
      <div class="metric-card">
        <h3>身体指标</h3>
        <div class="metric-item">
          <span class="metric-name">体重</span>
          <span class="metric-value" id="metric-weight">0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-weight"></div>
        </div>
        
        <div class="metric-item">
          <span class="metric-name">BMI</span>
          <span class="metric-value" id="metric-bmi">0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-bmi"></div>
        </div>
        
        <div class="metric-item">
          <span class="metric-name">体脂率</span>
          <span class="metric-value" id="metric-fat">0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fat"></div>
        </div>
        
        <div class="metric-item">
          <span class="metric-name">心率</span>
          <span class="metric-value" id="metric-heart">0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-heart"></div>
        </div>
      </div>
      
      <div class="metric-card">
        <h3>身体成分</h3>
        <div class="metric-item">
          <span class="metric-name">体水分量</span>
          <span class="metric-value">
            <span id="comp-water">0</span><span class="metric-unit">kg</span>
            <span class="level-badge" id="badge-water"></span>
          </span>
        </div>
        
        <div class="metric-item">
          <span class="metric-name">蛋白质质量</span>
          <span class="metric-value">
            <span id="comp-protein">0</span><span class="metric-unit">kg</span>
            <span class="level-badge" id="badge-protein"></span>
          </span>
        </div>
        
        <div class="metric-item">
          <span class="metric-name">脂肪量</span>
          <span class="metric-value">
            <span id="comp-fat">0</span><span class="metric-unit">kg</span>
            <span class="level-badge" id="badge-fat"></span>
          </span>
        </div>
        
        <div class="metric-item">
          <span class="metric-name">骨盐量</span>
          <span class="metric-value">
            <span id="comp-bone">0</span><span class="metric-unit">kg</span>
            <span class="level-badge" id="badge-bone"></span>
          </span>
        </div>
        
        <div class="metric-item">
          <span class="metric-name">肌肉量</span>
          <span class="metric-value">
            <span id="comp-muscle">0</span><span class="metric-unit">kg</span>
            <span class="level-badge" id="badge-muscle"></span>
          </span>
        </div>
        
        <div class="metric-item">
          <span class="metric-name">内脏脂肪等级</span>
          <span class="metric-value">
            <span id="comp-visceral">0</span>
            <span class="level-badge" id="badge-visceral"></span>
          </span>
        </div>
        
        <div class="metric-item">
          <span class="metric-name">基础代谢率</span>
          <span class="metric-value">
            <span id="comp-metabolism">0</span><span class="metric-unit">kcal</span>
          </span>
        </div>
      </div>
      
      <div class="metric-card">
        <h3>评估指标</h3>
        <div class="assessment-grid">
          <div class="assessment-item">
            <div class="assessment-label">身体形态</div>
            <div class="assessment-value" id="assess-shape"></div>
          </div>
          <div class="assessment-item">
            <div class="assessment-label">身体类型</div>
            <div class="assessment-value" id="assess-type"></div>
          </div>
          <div class="assessment-item">
            <div class="assessment-label">推测腰臀比</div>
            <div class="assessment-value" id="assess-whr"></div>
          </div>
          <div class="assessment-item">
            <div class="assessment-label">身体年龄</div>
            <div class="assessment-value" id="assess-age"></div>
          </div>
          <div class="assessment-item">
            <div class="assessment-label">骨骼肌指数</div>
            <div class="assessment-value" id="assess-skeletal"></div>
          </div>
          <div class="assessment-item">
            <div class="assessment-label">建议热量摄入</div>
            <div class="assessment-value" id="assess-calorie"></div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="chart-card">
      <h3>体重与体脂变化趋势</h3>
      <div class="chart-container">
        <canvas id="trendChart"></canvas>
      </div>
    </div>
    
    <div class="segment-card">
      <h3>节段分析</h3>
      <div class="segment-grid">
        <div>
          <h4 style="color: #ff9800; margin-bottom: 16px; text-align: center;">节段脂肪分析</h4>
          <div class="segment-body">
            <div class="body-icon">
              <svg viewBox="0 0 80 120">
                <circle cx="40" cy="20" r="8" fill="#ff9800"/>
                <line x1="40" y1="28" x2="40" y2="45" stroke="#ff9800" stroke-width="3"/>
                <line x1="40" y1="35" x2="20" y2="30" stroke="#ff9800" stroke-width="3"/>
                <line x1="40" y1="35" x2="60" y2="30" stroke="#ff9800" stroke-width="3"/>
                <ellipse cx="40" cy="60" rx="18" ry="20" fill="#ff9800" opacity="0.8"/>
                <line x1="40" y1="80" x2="40" y2="100" stroke="#ff9800" stroke-width="3"/>
                <line x1="40" y1="90" x2="20" y2="95" stroke="#ff9800" stroke-width="3"/>
                <line x1="40" y1="90" x2="60" y2="95" stroke="#ff9800" stroke-width="3"/>
              </svg>
            </div>
            <div class="segment-list">
              <div class="segment-item">
                <span class="segment-label">左上肢</span>
                <span class="segment-value" id="fat-left-arm">0</span>
              </div>
              <div class="segment-item">
                <span class="segment-label">右上肢</span>
                <span class="segment-value" id="fat-right-arm">0</span>
              </div>
              <div class="segment-item">
                <span class="segment-label">躯干</span>
                <span class="segment-value" id="fat-trunk">0</span>
              </div>
              <div class="segment-item">
                <span class="segment-label">左下肢</span>
                <span class="segment-value" id="fat-left-leg">0</span>
              </div>
              <div class="segment-item">
                <span class="segment-label">右下肢</span>
                <span class="segment-value" id="fat-right-leg">0</span>
              </div>
            </div>
          </div>
        </div>
        
        <div>
          <h4 style="color: #4caf50; margin-bottom: 16px; text-align: center;">节段肌肉分析</h4>
          <div class="segment-body">
            <div class="body-icon">
              <svg viewBox="0 0 80 120">
                <circle cx="40" cy="20" r="8" fill="#4caf50"/>
                <line x1="40" y1="28" x2="40" y2="45" stroke="#4caf50" stroke-width="4"/>
                <line x1="40" y1="35" x2="20" y2="30" stroke="#4caf50" stroke-width="4"/>
                <line x1="40" y1="35" x2="60" y2="30" stroke="#4caf50" stroke-width="4"/>
                <ellipse cx="40" cy="60" rx="20" ry="22" fill="#4caf50" opacity="0.8"/>
                <line x1="40" y1="82" x2="40" y2="100" stroke="#4caf50" stroke-width="4"/>
                <line x1="40" y1="90" x2="20" y2="95" stroke="#4caf50" stroke-width="4"/>
                <line x1="40" y1="90" x2="60" y2="95" stroke="#4caf50" stroke-width="4"/>
                <line x1="32" y1="50" x2="48" y2="50" stroke="#81c784" stroke-width="2"/>
                <line x1="32" y1="60" x2="48" y2="60" stroke="#81c784" stroke-width="2"/>
                <line x1="32" y1="70" x2="48" y2="70" stroke="#81c784" stroke-width="2"/>
              </svg>
            </div>
            <div class="segment-list">
              <div class="segment-item">
                <span class="segment-label">左上肢</span>
                <span class="segment-value" id="muscle-left-arm">0</span>
              </div>
              <div class="segment-item">
                <span class="segment-label">右上肢</span>
                <span class="segment-value" id="muscle-right-arm">0</span>
              </div>
              <div class="segment-item">
                <span class="segment-label">躯干</span>
                <span class="segment-value" id="muscle-trunk">0</span>
              </div>
              <div class="segment-item">
                <span class="segment-label">左下肢</span>
                <span class="segment-value" id="muscle-left-leg">0</span>
              </div>
              <div class="segment-item">
                <span class="segment-label">右下肢</span>
                <span class="segment-value" id="muscle-right-leg">0</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="footer">
      <p>数据仅供参考，不建议作为医疗或健康状况依据</p>
      <p style="margin-top: 8px;">健康管理系统</p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
