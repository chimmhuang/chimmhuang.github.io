<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>Chimm's Homepage</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      padding: 60px 0;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 40px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .link-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px 32px;
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }

    .link-icon {
      font-size: 24px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 60px;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-4px);
    }

    .feature-icon {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .feature-icon.health {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }

    .feature-icon.code {
      background: linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%);
    }

    .feature-icon.blog {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .feature-card h3 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .feature-card p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      line-height: 1.6;
    }

    .footer {
      text-align: center;
      padding: 40px 0;
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
    }

    .footer a {
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: white;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 40px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 16px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 32px;
      }

      .hero p {
        font-size: 16px;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .stat-value {
        font-size: 28px;
      }
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 48px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      animation: blink 1s infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-content">
        <div class="avatar">C</div>
        <h1>
          Hi, I'm Chimm
          <span class="cursor"></span>
        </h1>
        <p>热爱生活，追求健康，不断成长</p>
        
        <div class="links">
          <a href="https://github.com/chimmhuang" target="_blank" class="link-card">
            <span class="link-icon">📦</span>
            <span>GitHub</span>
          </a>
          <a href="health/" class="link-card">
            <span class="link-icon">💪</span>
            <span>健康数据</span>
          </a>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value">29</div>
        <div class="stat-label">年龄</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">179cm</div>
        <div class="stat-label">身高</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">82.9kg</div>
        <div class="stat-label">体重</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">81</div>
        <div class="stat-label">健康得分</div>
      </div>
    </div>

    <div class="features">
      <div class="feature-card">
        <div class="feature-icon health">💪</div>
        <h3>健康管理</h3>
        <p>记录身体指标变化，追踪健康数据趋势，保持良好的生活习惯</p>
        <a href="health/" style="display: inline-block; margin-top: 16px; color: #667eea; text-decoration: none; font-size: 14px;">查看详情 →</a>
      </div>
      
      <div class="feature-card">
        <div class="feature-icon code">💻</div>
        <h3>技术分享</h3>
        <p>分享编程心得、技术文章和项目经验，与大家一起成长</p>
      </div>
      
      <div class="feature-card">
        <div class="feature-icon blog">📝</div>
        <h3>生活记录</h3>
        <p>记录生活点滴，分享日常感悟，留下美好的回忆</p>
      </div>
    </div>

    <div class="footer">
      <p>&copy; 2026 Chimm. All rights reserved.</p>
      <p style="margin-top: 8px;">
        <a href="https://github.com/chimmhuang">GitHub</a> | 
        <a href="health/">健康数据</a>
      </p>
    </div>
  </div>
</body>
</html>
